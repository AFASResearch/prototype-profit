<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ontwerp RPT00692</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <style>
    :root {
      --color-primary: #0057B8;
      --color-dark: #1a202c;
      --color-light: #f7f8fa;
      --color-white: #ffffff;
      --color-muted: #64748b;
      --color-border: #e2e8f0;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --sidebar-width: 280px;
      --content-max: 880px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      color: var(--color-dark);
      background: var(--color-white);
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
    }

    /* Sidebar */
    .sidebar {
      position: fixed; top: 0; left: 0; width: var(--sidebar-width); height: 100vh;
      background: var(--color-dark); color: #cbd5e1; overflow-y: auto;
      padding: 1.5rem 0; z-index: 100; display: flex; flex-direction: column;
    }
    .sidebar-title {
      padding: 0 1.25rem 1rem; font-size: .85rem; font-weight: 700;
      color: #94a3b8; text-transform: uppercase; letter-spacing: .05em;
      border-bottom: 1px solid #334155;
    }
    .sidebar nav { flex: 1; overflow-y: auto; padding: .75rem 0; }
    .sidebar a {
      display: block; padding: .4rem 1.25rem; font-size: .82rem;
      color: #94a3b8; text-decoration: none; border-left: 3px solid transparent;
      transition: all .15s;
    }
    .sidebar a:hover, .sidebar a.active {
      color: #e2e8f0; background: rgba(255,255,255,.05);
      border-left-color: var(--color-primary);
    }
    .sidebar a.depth-2 { padding-left: 2rem; font-size: .78rem; }
    .sidebar a.depth-3 { padding-left: 2.75rem; font-size: .75rem; color: #64748b; }

    /* Content */
    .content {
      margin-left: var(--sidebar-width); max-width: var(--content-max);
      padding: 2.5rem 3rem 4rem;
    }

    /* Typography */
    .content h1 { font-size: 2rem; font-weight: 800; margin: 2rem 0 1rem; color: var(--color-primary); border-bottom: 2px solid var(--color-primary); padding-bottom: .5rem; }
    .content h2 { font-size: 1.5rem; font-weight: 700; margin: 2.5rem 0 .75rem; padding-bottom: .4rem; border-bottom: 1px solid var(--color-border); }
    .content h3 { font-size: 1.2rem; font-weight: 600; margin: 1.8rem 0 .5rem; }
    .content h4 { font-size: 1.05rem; font-weight: 600; margin: 1.5rem 0 .4rem; }
    .content p { margin: .6rem 0; font-size: .95rem; }
    .content ul, .content ol { margin: .5rem 0 .5rem 1.5rem; font-size: .95rem; }
    .content li { margin: .25rem 0; }
    .content blockquote {
      margin: 1rem 0; padding: .75rem 1.25rem;
      border-left: 4px solid var(--color-primary); background: #f0f4ff;
      border-radius: 0 6px 6px 0; font-size: .9rem; color: #475569;
    }
    .content hr { border: none; border-top: 1px solid var(--color-border); margin: 2rem 0; }
    .content img { max-width: 100%; border-radius: 6px; margin: 1rem 0; }
    .content a { color: var(--color-primary); }

    /* Tables */
    .content table {
      width: 100%; border-collapse: collapse; margin: 1rem 0;
      font-size: .85rem; line-height: 1.5;
    }
    .content th {
      background: var(--color-dark); color: var(--color-white);
      padding: .6rem .75rem; text-align: left; font-weight: 600;
      position: sticky; top: 0;
    }
    .content td { padding: .5rem .75rem; border-bottom: 1px solid var(--color-border); }
    .content tr:nth-child(even) td { background: var(--color-light); }
    .content tr:hover td { background: #e8f0fe; }

    /* Code */
    .content code {
      font-family: var(--font-mono); font-size: .85em;
      background: var(--color-light); padding: .15em .4em; border-radius: 4px;
    }
    .content pre {
      background: var(--color-dark); color: #e2e8f0; padding: 1.25rem;
      border-radius: 8px; overflow-x: auto; margin: 1rem 0; line-height: 1.5;
    }
    .content pre code {
      background: none; padding: 0; font-size: .82rem; color: inherit;
    }

    /* Mermaid */
    .content .mermaid { margin: 1.5rem 0; text-align: center; }

    /* Loading */
    #loading {
      margin-left: var(--sidebar-width); padding: 4rem 3rem;
      color: var(--color-muted); font-size: 1.1rem;
    }

    /* Print */
    @media print {
      .sidebar { display: none; }
      .content { margin-left: 0; max-width: 100%; padding: 1rem; }
    }

    /* Mobile */
    @media (max-width: 900px) {
      .sidebar { display: none; }
      .content { margin-left: 0; padding: 1.5rem; }
    }
  </style>
</head>
<body>
  <div class="sidebar">
    <div class="sidebar-title">Ontwerp RPT00692</div>
    <nav id="toc"></nav>
  </div>
  <div id="loading">Ontwerp laden…</div>
  <div class="content" id="content" style="display:none"></div>
  <script>
    (async function() {
      try {
        const resp = await fetch('ontwerp.md');
        if (!resp.ok) throw new Error('Kon ontwerp.md niet laden (' + resp.status + ')');
        const md = await resp.text();

        // Configure marked
        const renderer = new marked.Renderer();
        const headings = [];

        renderer.heading = function({ tokens, depth, raw }) {
          const text = this.parser.parseInline(tokens);
          const id = text.replace(/<[^>]+>/g, '').trim()
            .toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
          headings.push({ id, text: text.replace(/<[^>]+>/g, ''), depth });
          return '<h' + depth + ' id="' + id + '">' + text + '</h' + depth + '>';
        };

        renderer.code = function({ text, lang }) {
          if (lang === 'mermaid') {
            return '<div class="mermaid">' + text + '</div>';
          }
          return '<pre><code class="language-' + (lang || '') + '">'
            + text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            + '</code></pre>';
        };

        marked.setOptions({ renderer, gfm: true, breaks: false });

        // Render markdown
        document.getElementById('content').innerHTML = marked.parse(md);
        document.getElementById('content').style.display = 'block';
        document.getElementById('loading').remove();

        // Build TOC
        const toc = document.getElementById('toc');
        headings.forEach(function(h) {
          if (h.depth > 3) return;
          const a = document.createElement('a');
          a.href = '#' + h.id;
          a.textContent = h.text;
          a.className = 'depth-' + h.depth;
          toc.appendChild(a);
        });

        // Highlight active TOC item on scroll
        const observer = new IntersectionObserver(function(entries) {
          entries.forEach(function(e) {
            if (e.isIntersecting) {
              toc.querySelectorAll('a').forEach(function(a) { a.classList.remove('active'); });
              const active = toc.querySelector('a[href="#' + e.target.id + '"]');
              if (active) active.classList.add('active');
            }
          });
        }, { rootMargin: '-80px 0px -80% 0px' });

        document.querySelectorAll('.content h1, .content h2, .content h3').forEach(function(el) {
          observer.observe(el);
        });

        // Render mermaid diagrams
        if (document.querySelector('.mermaid')) {
          mermaid.initialize({ startOnLoad: false, theme: 'neutral', securityLevel: 'loose' });
          await mermaid.run({ querySelector: '.mermaid' });
        }

      } catch (err) {
        document.getElementById('loading').textContent = 'Fout: ' + err.message;
        console.error(err);
      }
    })();
  </script>
</body>
</html>
